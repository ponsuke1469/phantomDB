<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファンキルリンクスキル検索</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f2f3f7;
margin:0;
}

header{
background:#1e2a38;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

.filters{
margin-bottom:20px;
}

.filters button{
margin:4px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#e1e4ea;
cursor:pointer;
}

.filters button.active{
background:#2f80ed;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:14px;
}

.card{
background:white;
border-radius:10px;
padding:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
gap:10px;
}

.card img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.name{
font-weight:bold;
font-size:16px;
}

.skill{
font-size:14px;
margin-top:4px;
}

.meta{
font-size:12px;
color:#666;
margin-top:2px;
}

</style>
</head>

<body>

<header>
ファンキルリンクスキル検索
</header>

<div class="container">

<input id="search" placeholder="キャラ名・リンクスキル検索">

<div class="filters">

属性  
<button onclick="setAttr('火')">火</button>
<button onclick="setAttr('水')">水</button>
<button onclick="setAttr('風')">風</button>
<button onclick="setAttr('光')">光</button>
<button onclick="setAttr('闇')">闇</button>
<button onclick="setAttr('')">すべて</button>

</div>

<div class="grid" id="results"></div>

</div>

<script>

const API="https://opensheet.elk.sh/1mItxyXuNcRXAj0FFs-uzrQHd3eBe9DHQ0-7UKSD7q8asg/Sheet1"

let DATA=[]
let ATTR=""

fetch(API)
.then(r=>r.json())
.then(data=>{
DATA=data
render(DATA)
})

function render(list){

const box=document.getElementById("results")
box.innerHTML=""

list.forEach(c=>{

const el=document.createElement("div")
el.className="card"

el.innerHTML=`

<img src="${c.画像 || 'https://placehold.co/80'}">

<div>

<div class="name">${c.キャラ名 || ""}</div>

<div class="skill">${c.リンクスキル || ""}</div>

<div class="meta">${c.条件 || ""}</div>

<div class="meta">${c.効果 || ""}</div>

</div>

`

box.appendChild(el)

})

}

function setAttr(attr){

ATTR=attr

apply()

}

function apply(){

let word=document.getElementById("search").value

let list=DATA.filter(x=>{

let ok=true

if(word){

ok =

(x.キャラ名 && x.キャラ名.includes(word)) ||
(x.リンクスキル && x.リンクスキル.includes(word))

}

if(ATTR){

ok = ok && x.属性==ATTR

}

return ok

})

render(list)

}

document.getElementById("search").addEventListener("input",apply)

</script>

</body>
</html>
