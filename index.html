<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantomDB | 究極版</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        .search-area { max-width: 800px; margin: 0 auto; }
        #search { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 25px; border: none; outline: none; margin-bottom: 10px; }
        .filter-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .chip { padding: 4px 12px; border-radius: 15px; background: rgba(255,255,255,0.2); cursor: pointer; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.3); }
        .chip.active { background: var(--accent); border-color: #fff; }
        main { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 6px solid var(--accent); }
        .card-h { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; }
        .icon { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; background: #eee; }
        .name { font-weight: bold; font-size: 1rem; color: var(--primary); flex: 1; }
        .attr-badge { font-size: 0.7rem; padding: 2px 6px; background: #eee; border-radius: 4px; }
        .s-label { font-size: 0.7rem; color: #7f8c8d; font-weight: bold; margin-top: 8px; }
        .s-content { font-size: 0.85rem; background: #f9f9f9; padding: 6px; border-radius: 4px; border: 1px solid #f0f0f0; white-space: pre-wrap; }
        #debug-info { font-size: 0.7rem; color: #ffeb3b; margin-top: 5px; }
        /* 属性色 */
        .attr-火 { border-left-color: #e74c3c; } .attr-水 { border-left-color: #3498db; }
        .attr-雷 { border-left-color: #f1c40f; } .attr-風 { border-left-color: #2ecc71; }
        .attr-光 { border-left-color: #f39c12; } .attr-闇 { border-left-color: #9b59b6; }
    </style>
</head>
<body>

<header>
    <div class="search-area">
        <h1>PhantomDB</h1>
        <input type="text" id="search" placeholder="名称・スキルキーワード検索...">
        <div class="filter-group" id="attr-filters"></div>
        <div id="debug-info">データを読み込んでいます...</div>
    </div>
</header>

<main><div id="results" class="results-grid"></div></main>

<script>
    const SPREADSHEET_ID = "1mltyXuNcRXAj0fFS-uzqHd3eBe9DHQ0-7UKSD7q8agg";
    // 確実にデータを取るためのURL
    const API_URL = `https://opensheet.elk.sh/${SPREADSHEET_ID}/sheet1`;
    
    let allData = [];
    let selectedAttrs = [];

    async function init() {
        const debugEl = document.getElementById('debug-info');
        try {
            console.log("Fetching...");
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
            
            const data = await res.json();
            console.log("Raw Data:", data);

            if (!Array.isArray(data)) throw new Error("データが配列ではありません。");

            // 列名の「ゆらぎ」を吸収する処理
            allData = data.map(item => ({
                name: item["名称"] || item["name"] || "---",
                attr: item["属性"] || item["attribute"] || "無",
                link: item["リンクスキル"] || item["link_skill"] || "",
                passive: item["パッシブスキル"] || item["passive_skill"] || "",
                icon: item["アイコンURL"] || item["icon_url"] || ""
            }));

            debugEl.textContent = `読み込み成功: ${allData.length}件`;
            setupFilters();
            render();
        } catch (e) {
            console.error(e);
            debugEl.innerHTML = `⚠️ エラー: ${e.message}<br>スプレッドシートの共有設定とシート名(sheet1)を再確認してください。`;
        }
    }

    function setupFilters() {
        const attrs = [...new Set(allData.map(i => i.attr).filter(a => a !== "無"))];
        const container = document.getElementById('attr-filters');
        attrs.forEach(attr => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.textContent = attr;
            chip.onclick = () => {
                chip.classList.toggle('active');
                if (selectedAttrs.includes(attr)) {
                    selectedAttrs = selectedAttrs.filter(a => a !== attr);
                } else {
                    selectedAttrs.push(attr);
                }
                render();
            };
            container.appendChild(chip);
        });
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase().trim();
        const container = document.getElementById('results');
        
        const filtered = allData.filter(i => {
            const matchText = !query || i.name.includes(query) || i.link.includes(query) || i.passive.includes(query);
            const matchAttr = selectedAttrs.length === 0 || selectedAttrs.includes(i.attr);
            return matchText && matchAttr;
        });

        container.innerHTML = filtered.map(i => `
            <div class="card attr-${i.attr}">
                <div class="card-h">
                    <img src="${i.icon}" class="icon" onerror="this.src='https://via.placeholder.com/48?text=NoImg'">
                    <div class="name">${i.name}</div>
                    <div class="attr-badge">${i.attr}</div>
                </div>
                ${i.link ? `<div class="s-label">リンク</div><div class="s-content">${i.link}</div>` : ''}
                ${i.passive ? `<div class="s-label">パッシブ</div><div class="s-content">${i.passive}</div>` : ''}
            </div>
        `).join('');
    }

    document.getElementById('search').addEventListener('input', render);
    init();
</script>
</body>
</html>
