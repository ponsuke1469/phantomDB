<script>

const API="https://opensheet.elk.sh/1mItxyXuNcRXAj0fFs-uzqHd3eBe9DHQ0-7UKSD7q8asg/Sheet1"

let DATA=[]
let ATTR=""

fetch(API)
.then(r=>r.json())
.then(d=>{
 DATA=d
 draw()
})

document.getElementById("search").addEventListener("input",draw)

function setAttr(a){
 ATTR=a
 draw()
}

function draw(){

 const word=document.getElementById("search").value

 const list=DATA.filter(d=>{

  const matchWord =
   d.名前.includes(word) ||
   d.リンクスキル.includes(word) ||
   d.パッシブスキル.includes(word) ||
   d.アクティブスキル.includes(word)

  const matchAttr =
   !ATTR || d.属性.includes(ATTR)

  return matchWord && matchAttr

 })

 const box=document.getElementById("results")
 box.innerHTML=""

 list.forEach(d=>{

  box.innerHTML+=`

  <div class="card">

   <img src="${d.アイコンURL}" class="icon">

   <h3>${d.名前}</h3>

   <div class="attr">${d.属性}</div>

   <b>リンクスキル</b>
   <div>${d.リンクスキル}</div>
   <div>${d.リンクスキル2}</div>

   <b>パッシブ</b>
   <div>${d.パッシブスキル}</div>
   <div>${d.パッシブスキル2}</div>

   <b>アクティブ</b>
   <div>${d.アクティブスキル}</div>
   <div>${d.アクティブスキル2}</div>

  </div>

  `
 })

}

</script>
