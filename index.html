<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ファンキルリンクスキル検索</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial, sans-serif;
background:#f5f6fa;
margin:0;
}

header{
background:#2c3e50;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

.filters{
margin-bottom:20px;
}

.filters button{
margin:4px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#ddd;
cursor:pointer;
}

.filters button.active{
background:#3498db;
color:white;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name{
font-weight:bold;
font-size:18px;
margin-bottom:6px;
}

.skill{
color:#333;
margin-bottom:4px;
}

.meta{
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<header>
ファンキルリンクスキル検索
</header>

<div class="container">

<input id="search" placeholder="キャラ名・リンクスキル検索">

<div class="filters">

属性  
<button onclick="filterAttr('火')">火</button>
<button onclick="filterAttr('水')">水</button>
<button onclick="filterAttr('風')">風</button>
<button onclick="filterAttr('光')">光</button>
<button onclick="filterAttr('闇')">闇</button>
<button onclick="filterAttr('')">すべて</button>

</div>

<div id="results"></div>

</div>

<script>

const API="https://opensheet.elk.sh/1mItxyXuNcRXAj0FFs-uzrQHd3eBe9DHQ0-7UKSD7q8asg/Sheet1"

let DATA=[]
let CURRENT_ATTR=""

fetch(API)
.then(r=>r.json())
.then(data=>{
DATA=data
render(DATA)
})

function render(list){

const box=document.getElementById("results")
box.innerHTML=""

list.forEach(c=>{

const el=document.createElement("div")
el.className="card"

el.innerHTML=`
<div class="name">${c.キャラ名 || ""}</div>
<div class="skill">${c.リンクスキル || ""}</div>
<div class="meta">${c.条件 || ""}</div>
<div class="meta">${c.効果 || ""}</div>
`

box.appendChild(el)

})

}

function filterAttr(attr){

CURRENT_ATTR=attr

let list=DATA

if(attr){
list=list.filter(x=>x.属性==attr)
}

render(list)

}

document.getElementById("search").addEventListener("input",e=>{

let word=e.target.value

let list=DATA.filter(x=>

(x.キャラ名 && x.キャラ名.includes(word)) ||
(x.リンクスキル && x.リンクスキル.includes(word))

)

if(CURRENT_ATTR){
list=list.filter(x=>x.属性==CURRENT_ATTR)
}

render(list)

})

</script>

</body>
</html>
